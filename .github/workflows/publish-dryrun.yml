name: Publish (dry-run)

# Dry-run sibling of publish.yml. Runs the full build matrix + frontend +
# Caddy download + archive + checksum pipeline, but uploads the produced
# archives to a workflow-run artifact rather than a GitHub Release. Never
# creates or modifies a tag, never touches the Releases surface. Use this
# to verify pipeline changes (new RID, Caddy bump, install script changes,
# matrix reshape) before cutting a real release.
#
# Card #157, follow-up to #153.
#
# Triggers:
#   - workflow_dispatch: ad-hoc, with optional version override
#   - pull_request: any PR that touches release-pipeline-related files
#                   (publish.yml, this file, install scripts, caddy.version,
#                    release-assets bundle)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version stamp for the produced archives (no tag is created). Format: X.Y.Z'
        required: false
        default: '0.0.0-dryrun'
  pull_request:
    paths:
      - '.github/workflows/publish.yml'
      - '.github/workflows/publish-dryrun.yml'
      - 'docs/install.sh'
      - 'docs/install.ps1'
      - 'docs/install-system.ps1'
      - 'docs/install-system.sh'
      - 'caddy.version'
      - 'caddy-plugins.txt'
      - 'xcaddy.version'
      - 'release-assets/**'
      - 'frontend/**'

# Read-only token. The dry-run never writes to the Releases surface, never
# creates tags. Workflow-run artifacts upload via actions/upload-artifact
# only need the default GITHUB_TOKEN which has implicit write to its own run.
permissions:
  contents: read

jobs:
  resolve-version:
    name: Resolve dry-run version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Resolve
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # workflow_dispatch supplies inputs.version; pull_request does not.
          # For PR runs we synthesize a deterministic stamp from the PR number
          # so multiple dry-runs across PRs produce distinguishable archives.
          if [[ -n "${INPUT_VERSION:-}" ]]; then
            VERSION="${INPUT_VERSION}"
          elif [[ -n "${PR_NUMBER:-}" ]]; then
            VERSION="0.0.0-pr${PR_NUMBER}"
          else
            VERSION="0.0.0-dryrun"
          fi

          # Light validation: must be non-empty, no whitespace, no path separators.
          if [[ ! "${VERSION}" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Resolved version '${VERSION}' contains disallowed characters" >&2
            exit 1
          fi

          echo "Resolved dry-run version: ${VERSION}"
          echo "VERSION=${VERSION}" >> "${GITHUB_OUTPUT}"

  build-frontend:
    name: Build frontend (once)
    needs: resolve-version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npx vite build
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  build-matrix:
    name: Build ${{ matrix.rid }}
    needs: [resolve-version, build-frontend]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            goos: windows
            goarch: amd64
            caddy_bin: caddy.exe
            collabhost_bin: collabhost.exe
            ext: zip
          - rid: osx-arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            caddy_bin: caddy
            collabhost_bin: collabhost
            ext: tar.gz
          - rid: linux-x64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            caddy_bin: caddy
            collabhost_bin: collabhost
            ext: tar.gz
          - rid: linux-arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            caddy_bin: caddy
            collabhost_bin: collabhost
            ext: tar.gz
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download frontend artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: backend/Collabhost.Api/wwwroot

      # ---------------------------------------------------------------------
      # Caddy bundling -- mirrors publish.yml's xcaddy build path. See
      # publish.yml for the rationale on plugins, the pin file shape, and
      # the qemu-user-static linux-arm64 setup. Keep this block in lockstep
      # with publish.yml; the dryrun is the validation surface for any change
      # to the publish bundle pipeline.
      # ---------------------------------------------------------------------
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: false

      - name: Install xcaddy
        shell: bash
        run: |
          set -euo pipefail
          XCADDY_VER=$(tr -d '[:space:]' < xcaddy.version)
          echo "Installing xcaddy v${XCADDY_VER}"
          go install "github.com/caddyserver/xcaddy/cmd/xcaddy@v${XCADDY_VER}"
          go env GOPATH

      - name: Set up qemu (linux-arm64 only)
        if: matrix.rid == 'linux-arm64'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user-static
          if [ ! -e /proc/sys/fs/binfmt_misc/qemu-aarch64 ]; then
            echo "qemu-aarch64 binfmt registration missing" >&2
            exit 1
          fi

      - name: Build Caddy with plugins (xcaddy)
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CADDY_BIN: ${{ matrix.caddy_bin }}
        run: |
          set -euo pipefail

          CADDY_VER=$(tr -d '[:space:]' < caddy.version)
          # See publish.yml inline comment on the .exe suffix dance under
          # Git-Bash on Windows runners.
          GOPATH_BIN="$(go env GOPATH)/bin"
          if [[ -x "${GOPATH_BIN}/xcaddy.exe" ]]; then
            XCADDY="${GOPATH_BIN}/xcaddy.exe"
          elif [[ -x "${GOPATH_BIN}/xcaddy" ]]; then
            XCADDY="${GOPATH_BIN}/xcaddy"
          else
            echo "xcaddy not found in ${GOPATH_BIN}" >&2
            exit 1
          fi

          WITH_ARGS=()
          while IFS= read -r line || [[ -n "${line}" ]]; do
            trimmed="${line#"${line%%[![:space:]]*}"}"
            [[ -z "${trimmed}" || "${trimmed:0:1}" == "#" ]] && continue
            # shellcheck disable=SC2206
            parts=( ${trimmed} )
            if (( ${#parts[@]} < 2 )); then
              echo "Malformed plugin line: ${line}" >&2
              exit 1
            fi
            WITH_ARGS+=( --with "${parts[0]}@${parts[1]}" )
          done < caddy-plugins.txt

          if (( ${#WITH_ARGS[@]} == 0 )); then
            echo "No plugins declared in caddy-plugins.txt -- xcaddy needs at least one --with" >&2
            exit 1
          fi

          mkdir -p caddy-build
          OUTPUT="caddy-build/${CADDY_BIN}"

          echo "Building Caddy v${CADDY_VER} for GOOS=${GOOS} GOARCH=${GOARCH}"
          echo "Plugins: ${WITH_ARGS[*]}"
          "${XCADDY}" build "v${CADDY_VER}" "${WITH_ARGS[@]}" --output "${OUTPUT}"

          if [[ "${GOOS}" != "windows" ]]; then
            chmod +x "${OUTPUT}"
          fi
          ls -la "${OUTPUT}"

      - name: Verify Caddy modules
        shell: bash
        env:
          CADDY_BIN: ${{ matrix.caddy_bin }}
        run: |
          set -euo pipefail

          BIN="caddy-build/${CADDY_BIN}"
          "${BIN}" version
          MODULES="$("${BIN}" list-modules)"

          MISSING=0
          while IFS= read -r line || [[ -n "${line}" ]]; do
            trimmed="${line#"${line%%[![:space:]]*}"}"
            [[ -z "${trimmed}" || "${trimmed:0:1}" == "#" ]] && continue
            # shellcheck disable=SC2206
            parts=( ${trimmed} )
            (( ${#parts[@]} >= 3 )) || continue
            module_id="${parts[2]}"
            if grep -Fxq "${module_id}" <<< "${MODULES}"; then
              echo "  ok: ${module_id}"
            else
              echo "  MISSING: ${module_id}" >&2
              MISSING=1
            fi
          done < caddy-plugins.txt

          if [[ "${MISSING}" -ne 0 ]]; then
            echo "One or more plugins missing from built Caddy binary." >&2
            echo "--- caddy list-modules ---" >&2
            echo "${MODULES}" >&2
            exit 1
          fi

          echo "All declared plugins are baked into the binary."

      # Mirrors publish.yml "Compute wwwroot hash" -- see that step for the
      # algorithm contract (must match PortalIntegrityCheck.ComputeWwwrootHash).
      # Card #342.
      - name: Compute wwwroot hash
        id: wwwroot-hash
        shell: bash
        run: |
          set -euo pipefail
          ROOT="backend/Collabhost.Api/wwwroot"
          if [[ ! -d "${ROOT}" ]]; then
            echo "wwwroot directory missing at ${ROOT}" >&2
            exit 1
          fi
          HASH=$(cd "${ROOT}" && find . -type f -printf '%P\n' \
            | LC_ALL=C sort \
            | while IFS= read -r rel; do
                size=$(stat -c %s -- "${rel}" 2>/dev/null || stat -f %z -- "${rel}")
                fhash=$(sha256sum -- "${rel}" | cut -d' ' -f1)
                printf '%s\n%s\n%s\n' "${rel}" "${size}" "${fhash}"
              done \
            | sha256sum | cut -d' ' -f1)
          echo "wwwroot hash: ${HASH}"
          echo "HASH=${HASH}" >> "${GITHUB_OUTPUT}"

      # Mirrors publish.yml: self-contained single-file publish. AssemblyName
      # rename happens via PublishSingleFile-scoped property in the csproj
      # (see publish.yml comment block for the global-property landmine).
      # -p:WwwrootHash embeds the staged-wwwroot hash into the binary (#342).
      - name: Publish
        shell: bash
        working-directory: backend
        env:
          VER: ${{ needs.resolve-version.outputs.version }}
          RID: ${{ matrix.rid }}
          WWWROOT_HASH: ${{ steps.wwwroot-hash.outputs.HASH }}
        run: |
          set -euo pipefail

          dotnet publish Collabhost.Api/Collabhost.Api.csproj \
            -c Release \
            -r "${RID}" \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:Version="${VER}" \
            -p:WwwrootHash="${WWWROOT_HASH}" \
            -o "../publish/collabhost-${VER}-${RID}"

      - name: Stage archive
        shell: bash
        env:
          VER: ${{ needs.resolve-version.outputs.version }}
          RID: ${{ matrix.rid }}
          CADDY_BIN: ${{ matrix.caddy_bin }}
          COLLABHOST_BIN: ${{ matrix.collabhost_bin }}
          WWWROOT_HASH: ${{ steps.wwwroot-hash.outputs.HASH }}
        run: |
          set -euo pipefail

          PUB="publish/collabhost-${VER}-${RID}"
          STAGE="archive-stage/collabhost-${VER}-${RID}"

          rm -rf "${STAGE}"
          mkdir -p "${STAGE}/LICENSES"

          cp "${PUB}/${COLLABHOST_BIN}"         "${STAGE}/"
          cp "${PUB}/appsettings.json"          "${STAGE}/"
          cp "caddy-build/${CADDY_BIN}"         "${STAGE}/"
          cp "release-assets/INSTALL.md"        "${STAGE}/"
          cp "release-assets/caddy-LICENSE"     "${STAGE}/LICENSES/"
          cp "release-assets/caddy-NOTICE"      "${STAGE}/LICENSES/"
          cp -R "${PUB}/wwwroot"                "${STAGE}/"
          # wwwroot.sha256 sidecar -- see publish.yml Stage archive for contract. Card #342.
          printf '%s' "${WWWROOT_HASH}"         > "${STAGE}/wwwroot.sha256"

          if [[ "${RID}" != win-x64 ]]; then
            chmod +x "${STAGE}/${COLLABHOST_BIN}"
            chmod +x "${STAGE}/${CADDY_BIN}"
          fi

          echo "Staged contents:"
          ls -la "${STAGE}"
          ls -la "${STAGE}/LICENSES"

      - name: Archive (zip)
        if: matrix.ext == 'zip'
        shell: pwsh
        env:
          VER: ${{ needs.resolve-version.outputs.version }}
          RID: ${{ matrix.rid }}
        run: |
          $stage = "archive-stage/collabhost-$env:VER-$env:RID"
          Compress-Archive -Path "$stage/*" `
                           -DestinationPath "collabhost-$env:VER-$env:RID.zip"

      - name: Archive (tar.gz)
        if: matrix.ext == 'tar.gz'
        shell: bash
        env:
          VER: ${{ needs.resolve-version.outputs.version }}
          RID: ${{ matrix.rid }}
          CADDY_BIN: ${{ matrix.caddy_bin }}
          COLLABHOST_BIN: ${{ matrix.collabhost_bin }}
        run: |
          set -euo pipefail

          STAGE="archive-stage/collabhost-${VER}-${RID}"
          ARCHIVE="collabhost-${VER}-${RID}.tar.gz"

          tar -czf "${ARCHIVE}" \
            -C "${STAGE}" \
            "${COLLABHOST_BIN}" \
            appsettings.json \
            "${CADDY_BIN}" \
            INSTALL.md \
            LICENSES/caddy-LICENSE \
            LICENSES/caddy-NOTICE \
            wwwroot \
            wwwroot.sha256

      - name: Verify archive contents
        shell: bash
        env:
          VER: ${{ needs.resolve-version.outputs.version }}
          RID: ${{ matrix.rid }}
          EXT: ${{ matrix.ext }}
          CADDY_BIN: ${{ matrix.caddy_bin }}
          COLLABHOST_BIN: ${{ matrix.collabhost_bin }}
          WWWROOT_HASH: ${{ steps.wwwroot-hash.outputs.HASH }}
        run: |
          set -euo pipefail

          ARCHIVE="collabhost-${VER}-${RID}.${EXT}"
          VERIFY_DIR="verify-${RID}"

          rm -rf "${VERIFY_DIR}"
          mkdir -p "${VERIFY_DIR}"

          case "${ARCHIVE}" in
            *.zip)    unzip -q "${ARCHIVE}" -d "${VERIFY_DIR}" ;;
            *.tar.gz) tar -xzf "${ARCHIVE}" -C "${VERIFY_DIR}" ;;
          esac

          echo "Archive listing:"
          (cd "${VERIFY_DIR}" && find . -type f | sort)

          if [[ -d "${VERIFY_DIR}/collabhost-${VER}-${RID}" ]]; then
            echo "Archive layout unexpected: found wrapping directory collabhost-${VER}-${RID}/ at archive root." >&2
            echo "Archives must be flat (contract items at root). Installer scripts assume flat layout." >&2
            exit 1
          fi

          MISSING=0
          for path in \
            "${COLLABHOST_BIN}" \
            "appsettings.json" \
            "${CADDY_BIN}" \
            "INSTALL.md" \
            "LICENSES/caddy-LICENSE" \
            "LICENSES/caddy-NOTICE" \
            "wwwroot.sha256"
          do
            if [[ ! -f "${VERIFY_DIR}/${path}" ]]; then
              echo "MISSING: ${path}" >&2
              MISSING=1
            fi
          done

          if [[ ! -d "${VERIFY_DIR}/wwwroot" ]]; then
            echo "MISSING: wwwroot/" >&2
            MISSING=1
          elif [[ ! -f "${VERIFY_DIR}/wwwroot/index.html" ]]; then
            echo "MISSING: wwwroot/index.html" >&2
            MISSING=1
          elif [[ -z "$(ls -A "${VERIFY_DIR}/wwwroot/assets" 2>/dev/null)" ]]; then
            echo "MISSING: wwwroot/assets/* (directory empty)" >&2
            MISSING=1
          fi

          # wwwroot.sha256 content sanity: 64 hex chars, no newline. Card #342.
          if [[ -f "${VERIFY_DIR}/wwwroot.sha256" ]]; then
            SIDECAR=$(cat "${VERIFY_DIR}/wwwroot.sha256")
            if [[ ! "${SIDECAR}" =~ ^[0-9a-f]{64}$ ]]; then
              echo "MALFORMED: wwwroot.sha256 is not 64 lowercase hex chars (got '${SIDECAR}')" >&2
              MISSING=1
            elif [[ "${SIDECAR}" != "${WWWROOT_HASH}" ]]; then
              echo "MISMATCH: wwwroot.sha256 (${SIDECAR}) != computed hash (${WWWROOT_HASH})" >&2
              MISSING=1
            fi
          fi

          if [[ "${MISSING}" -ne 0 ]]; then
            echo "Archive contract verification failed." >&2
            exit 1
          fi

          echo "Archive contract verified: flat layout, 8/8 items present."

      - name: Checksum
        shell: bash
        env:
          VER: ${{ needs.resolve-version.outputs.version }}
          RID: ${{ matrix.rid }}
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail

          ARCHIVE="collabhost-${VER}-${RID}.${EXT}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

          cat "${ARCHIVE}.sha256"

      # Dry-run divergence point: instead of `gh release upload`, attach the
      # archive + per-leg checksum to the workflow run as a downloadable
      # artifact. Operators inspect the run page; nothing leaks to Releases.
      - name: Upload archive artifact (workflow run)
        uses: actions/upload-artifact@v6
        with:
          name: archive-${{ matrix.rid }}
          path: |
            collabhost-*-${{ matrix.rid }}.${{ matrix.ext }}
            collabhost-*-${{ matrix.rid }}.${{ matrix.ext }}.sha256
          retention-days: 7

      # Per-leg checksum artifact for the aggregation job. Same shape as
      # publish.yml so the aggregator can be a near-copy.
      - name: Upload per-leg checksum artifact
        uses: actions/upload-artifact@v6
        with:
          name: checksum-${{ matrix.rid }}
          path: collabhost-*-${{ matrix.rid }}.${{ matrix.ext }}.sha256
          retention-days: 7

  aggregate-checksums:
    name: Aggregate checksums.txt
    needs: build-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download per-leg checksums
        uses: actions/download-artifact@v7
        with:
          pattern: checksum-*
          merge-multiple: true
          path: checksums-in

      - name: Aggregate
        shell: bash
        run: |
          set -euo pipefail

          # Mirrors publish.yml normalization: strip the leading '*' that
          # Git-Bash sha256sum emits in binary mode so the aggregated file
          # matches the format installer parsers expect.
          cat checksums-in/*.sha256 | sed 's/  \*/  /' > checksums.txt
          cat checksums.txt

      - name: Upload aggregated checksums (workflow run)
        uses: actions/upload-artifact@v6
        with:
          name: checksums-aggregated
          path: checksums.txt
          retention-days: 7

  # Archive smoke: PR-time end-to-end validation that THIS PR's archive boots
  # and serves the Portal correctly. Pairs THIS PR's archive (built by
  # build-matrix above) with the smoke checks that previously lived in
  # install-integration.yml's PR-side legs. Card #184 motivation: the install
  # scripts grew an operator-side wwwroot/ defense that (correctly) refused to
  # accept a v0.1.0 archive lacking wwwroot/. install-integration's PR mode
  # downloaded the latest published release, so the PR's own scripts ran
  # against an older archive's contract -- structurally guaranteed to break on
  # any contract change. By moving PR-time smoke into the dryrun (where the
  # archive being smoked IS this PR's archive), the contract loop closes.
  #
  # Coverage delta vs. the previous install-integration PR mode:
  #   -- this DOES exercise: the archive contract, binary boot, ContentRootPath
  #      (run from $HOME), Portal HTTP responses (/, /apps, /api/v1/status).
  #   -- this does NOT exercise: install.sh / install.ps1's own logic (PATH
  #      manipulation, reinstall preservation, Caddy bundling, sha256 verify).
  #      Those remain release-time-only via install-integration.yml. The
  #      install scripts hardcode the GitHub release URL, so driving them
  #      against a workflow-run artifact would require a script-side hatch
  #      we have explicitly chosen not to add.
  #
  # Runners mirror install-integration's native legs (linux-arm64 QEMU stays
  # release-only -- 10+ min per leg is too slow for PR feedback).
  archive-smoke:
    name: Smoke ${{ matrix.rid }}
    needs: [resolve-version, build-matrix]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            ext: tar.gz
            collabhost_bin: collabhost
            caddy_bin: caddy
          - rid: osx-arm64
            os: macos-latest
            ext: tar.gz
            collabhost_bin: collabhost
            caddy_bin: caddy
          - rid: win-x64
            os: windows-latest
            ext: zip
            collabhost_bin: collabhost.exe
            caddy_bin: caddy.exe
    env:
      VER: ${{ needs.resolve-version.outputs.version }}
      RID: ${{ matrix.rid }}
      EXT: ${{ matrix.ext }}
      COLLABHOST_BIN: ${{ matrix.collabhost_bin }}
      CADDY_BIN: ${{ matrix.caddy_bin }}
    steps:
      - name: Download archive artifact
        uses: actions/download-artifact@v7
        with:
          name: archive-${{ matrix.rid }}
          path: archive-in

      - name: Extract archive (Unix)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="archive-in/collabhost-${VER}-${RID}.${EXT}"
          INSTALL_DIR="${HOME}/.collabhost/bin"
          rm -rf "${INSTALL_DIR}"
          mkdir -p "${INSTALL_DIR}"
          tar -xzf "${ARCHIVE}" -C "${INSTALL_DIR}"
          chmod +x "${INSTALL_DIR}/${COLLABHOST_BIN}" "${INSTALL_DIR}/${CADDY_BIN}"
          echo "Extracted layout:"
          ls -la "${INSTALL_DIR}"

      - name: Extract archive (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $archive = "archive-in/collabhost-$env:VER-$env:RID.$env:EXT"
          $installDir = Join-Path $HOME '.collabhost\bin'
          if (Test-Path -LiteralPath $installDir) {
            Remove-Item -LiteralPath $installDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null
          Expand-Archive -LiteralPath $archive -DestinationPath $installDir
          Write-Host 'Extracted layout:'
          Get-ChildItem -LiteralPath $installDir | Select-Object Mode,Length,Name

      # Verify the eight contract items survived the round-trip through
      # upload-artifact + download-artifact + extract. Same checks as install.sh
      # post-extract -- redundant with the build-matrix "Verify archive contents"
      # step above, but that step verifies the freshly-built archive; this step
      # verifies the artifact-uploaded version operators (and the next job)
      # actually get.
      - name: Verify install layout (Unix)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          INSTALL_DIR="${HOME}/.collabhost/bin"
          test -x "${INSTALL_DIR}/${COLLABHOST_BIN}"  || { echo "Missing: ${COLLABHOST_BIN}" >&2; exit 1; }
          test -x "${INSTALL_DIR}/${CADDY_BIN}"       || { echo "Missing: ${CADDY_BIN}" >&2; exit 1; }
          test -f "${INSTALL_DIR}/appsettings.json"   || { echo "Missing: appsettings.json" >&2; exit 1; }
          test -f "${INSTALL_DIR}/INSTALL.md"         || { echo "Missing: INSTALL.md" >&2; exit 1; }
          test -d "${INSTALL_DIR}/LICENSES"           || { echo "Missing: LICENSES/" >&2; exit 1; }
          test -f "${INSTALL_DIR}/wwwroot/index.html" || { echo "Missing: wwwroot/index.html" >&2; exit 1; }
          test -f "${INSTALL_DIR}/wwwroot.sha256"     || { echo "Missing: wwwroot.sha256" >&2; exit 1; }
          echo "Install layout verified."

      - name: Verify install layout (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installDir = Join-Path $HOME '.collabhost\bin'
          foreach ($name in @('collabhost.exe','caddy.exe','appsettings.json','INSTALL.md','wwwroot.sha256')) {
            if (-not (Test-Path -LiteralPath (Join-Path $installDir $name))) {
              throw "Missing: $name"
            }
          }
          if (-not (Test-Path -LiteralPath (Join-Path $installDir 'LICENSES') -PathType Container)) {
            throw 'Missing: LICENSES/'
          }
          if (-not (Test-Path -LiteralPath (Join-Path $installDir 'wwwroot\index.html'))) {
            throw 'Missing: wwwroot/index.html'
          }
          Write-Host 'Install layout verified.'

      # Run --version from $HOME -- catches the F3 class (ContentRootPath
      # CWD-relative regressions). Mirrors install-integration.yml.
      - name: collabhost --version (from $HOME) (Unix)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          cd "${HOME}"
          OUT="$("${HOME}/.collabhost/bin/${COLLABHOST_BIN}" --version)"
          echo "${OUT}"
          echo "${OUT}" | grep -qi '^collabhost ' || {
            echo "Unexpected --version output: ${OUT}" >&2
            exit 1
          }

      - name: collabhost --version (from $HOME) (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location $HOME
          $exe = Join-Path $HOME '.collabhost\bin\collabhost.exe'
          $out = & $exe --version
          Write-Host $out
          if ($out -notmatch '^(?i)collabhost ') {
            throw "Unexpected --version output: $out"
          }

      # Boot the binary, wait for the admin-key bootstrap line, hit the Portal
      # HTTP endpoints, then stop. THIS is the test that catches a Portal
      # regression on the PR -- /, /apps, /api/v1/status all must respond
      # correctly against THIS PR's archive. Card #184.
      - name: Boot + HTTP smoke (Unix)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          INSTALL_DIR="${HOME}/.collabhost/bin"
          # Force a clean database so the first-boot bootstrap path runs.
          rm -rf "${INSTALL_DIR}/data"
          cd "${HOME}"
          LOG="${HOME}/firstboot.log"
          "${INSTALL_DIR}/${COLLABHOST_BIN}" > "${LOG}" 2>&1 &
          PID=$!
          FOUND=""
          for _ in $(seq 1 60); do
            if grep -q 'Collabhost admin key:' "${LOG}" 2>/dev/null; then
              FOUND=1
              break
            fi
            if ! kill -0 "${PID}" 2>/dev/null; then
              echo "Process exited before emitting admin-key line." >&2
              echo "--- log ---" >&2
              cat "${LOG}" >&2
              exit 1
            fi
            sleep 1
          done

          if [[ -n "${FOUND}" ]]; then
            PORT=58400
            for _ in $(seq 1 30); do
              if curl -fsSL "http://localhost:${PORT}/api/v1/status" >/dev/null 2>&1; then
                break
              fi
              sleep 1
            done
            STATUS_BODY="$(curl -fsSL "http://localhost:${PORT}/api/v1/status")"
            echo "${STATUS_BODY}" | grep -q '"status"' || {
              echo "Status endpoint did not return expected JSON: ${STATUS_BODY}" >&2
              exit 1
            }
            DASH_BODY="$(curl -fsSL "http://localhost:${PORT}/")"
            echo "${DASH_BODY}" | grep -qi '<!doctype html' || {
              echo "Dashboard root did not return HTML; wwwroot likely missing or unwired." >&2
              echo "${DASH_BODY}" | head -50 >&2
              exit 1
            }
            DEEP_BODY="$(curl -fsSL "http://localhost:${PORT}/apps")"
            echo "${DEEP_BODY}" | grep -qi '<!doctype html' || {
              echo "SPA fallback not wired: /apps returned non-HTML." >&2
              exit 1
            }
            echo "HTTP smoke check passed: status, root, deep link."
          fi

          # Bounded stop ladder: SIGINT -> 5s grace -> SIGTERM -> 3s grace -> SIGKILL.
          kill -INT "${PID}" 2>/dev/null || true
          for _ in $(seq 1 10); do kill -0 "${PID}" 2>/dev/null || break; sleep 0.5; done
          kill -TERM "${PID}" 2>/dev/null || true
          for _ in $(seq 1 6); do kill -0 "${PID}" 2>/dev/null || break; sleep 0.5; done
          kill -KILL "${PID}" 2>/dev/null || true
          wait "${PID}" 2>/dev/null || true

          if [[ -z "${FOUND}" ]]; then
            echo "Admin-key bootstrap line not seen within 60s." >&2
            echo "--- log tail ---" >&2
            tail -100 "${LOG}" >&2
            exit 1
          fi
          echo "Admin-key bootstrap line emitted."

      - name: Boot + HTTP smoke (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $InstallDir = Join-Path $HOME '.collabhost\bin'
          $exe = Join-Path $InstallDir 'collabhost.exe'

          # Clean database for first-boot bootstrap path.
          if (Test-Path -LiteralPath (Join-Path $InstallDir 'data')) {
            Remove-Item -LiteralPath (Join-Path $InstallDir 'data') -Recurse -Force
          }

          Set-Location $HOME
          $log = Join-Path $HOME 'firstboot.log'
          if (Test-Path -LiteralPath $log) { Remove-Item -LiteralPath $log -Force }

          $proc = Start-Process -FilePath $exe `
                                -RedirectStandardOutput $log `
                                -RedirectStandardError (Join-Path $HOME 'firstboot.err.log') `
                                -PassThru -WindowStyle Hidden
          $found = $false
          for ($i = 0; $i -lt 60; $i++) {
            if ((Test-Path -LiteralPath $log) -and (Select-String -LiteralPath $log -Pattern 'Collabhost admin key:' -Quiet)) {
              $found = $true
              break
            }
            if ($proc.HasExited) {
              Write-Host '--- stdout ---'
              if (Test-Path -LiteralPath $log) { Get-Content -LiteralPath $log }
              Write-Host '--- stderr ---'
              if (Test-Path -LiteralPath (Join-Path $HOME 'firstboot.err.log')) { Get-Content -LiteralPath (Join-Path $HOME 'firstboot.err.log') }
              throw 'Process exited before emitting admin-key line.'
            }
            Start-Sleep -Seconds 1
          }

          if ($found) {
            $port = 58400
            $ok = $false
            for ($i = 0; $i -lt 30; $i++) {
              try {
                Invoke-WebRequest -UseBasicParsing -Uri "http://localhost:$port/api/v1/status" -ErrorAction Stop | Out-Null
                $ok = $true
                break
              } catch {
                Start-Sleep -Seconds 1
              }
            }
            if (-not $ok) { throw 'Status endpoint never came up after 30s.' }

            $status = Invoke-WebRequest -UseBasicParsing -Uri "http://localhost:$port/api/v1/status"
            if ($status.Content -notmatch '"status"') { throw "Unexpected /status body: $($status.Content)" }

            $dash = Invoke-WebRequest -UseBasicParsing -Uri "http://localhost:$port/"
            if ($dash.Content -notmatch '(?i)<!doctype html') { throw 'Dashboard root did not return HTML.' }

            $deep = Invoke-WebRequest -UseBasicParsing -Uri "http://localhost:$port/apps"
            if ($deep.Content -notmatch '(?i)<!doctype html') { throw 'SPA fallback not wired: /apps returned non-HTML.' }

            Write-Host 'HTTP smoke check passed: status, root, deep link.'
          }

          if (-not $proc.HasExited) {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            $proc.WaitForExit(5000) | Out-Null
          }

          if (-not $found) {
            Write-Host '--- stdout tail ---'
            if (Test-Path -LiteralPath $log) { Get-Content -LiteralPath $log -Tail 100 }
            throw 'Admin-key bootstrap line not seen within 60s.'
          }
          Write-Host 'Admin-key bootstrap line emitted.'
