name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, 'release/*']

jobs:
  build-and-format:
    name: Build & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore Collabhost.slnx
      - name: Build
        run: dotnet build Collabhost.slnx --no-incremental --no-restore
      - name: Format check
        run: dotnet format Collabhost.slnx --verify-no-changes --no-restore

  api-tests:
    name: API Tests (${{ matrix.os }})
    needs: build-and-format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore Collabhost.slnx
      - name: Build
        run: dotnet build Collabhost.slnx --no-incremental --no-restore
      - name: Test
        run: dotnet test Collabhost.Api.Tests/Collabhost.Api.Tests.csproj --no-build --verbosity normal --report-xunit-trx --report-xunit-trx-filename api-test-results.trx --results-directory Collabhost.Api.Tests/TestResults
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: api-test-results-${{ matrix.os }}
          path: backend/Collabhost.Api.Tests/TestResults/api-test-results.trx

  smoke-tests:
    name: Smoke Tests (Aspire)
    needs: build-and-format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ASPIRE_ALLOW_UNSECURED_TRANSPORT: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore Collabhost.slnx
      - name: Build
        run: dotnet build Collabhost.slnx --no-incremental --no-restore
      - name: Trust dev certificate
        run: |
          EXIT_CODE=0
          dotnet dev-certs https --trust || EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ] && [ $EXIT_CODE -ne 4 ]; then
            echo "dotnet dev-certs https --trust failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
        env:
          WSL_INTEROP: ""
      - name: Test
        run: dotnet test Collabhost.AppHost.Tests/Collabhost.AppHost.Tests.csproj --no-build --verbosity normal --report-xunit-trx --report-xunit-trx-filename smoke-test-results.trx --results-directory Collabhost.AppHost.Tests/TestResults
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: smoke-test-results
          path: backend/Collabhost.AppHost.Tests/TestResults/smoke-test-results.trx

  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: reviewdog/action-actionlint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-check

  systemd-unit-drift:
    name: Systemd unit drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Lint systemd unit vs install-system.sh heredoc
        run: bash tools/lint-systemd-unit-drift.sh

  publish-tag-regex:
    name: Publish tag regex
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      # Exercise publish.yml's "Parse tag" regex against representative inputs.
      # Card #251 extended the original ^vX.Y.Z$ to accept SemVer 2.0 §9
      # pre-release identifiers (vX.Y.Z[-pre.release.ids]). This guard pins
      # the acceptance set so a future regex tweak that breaks rc / beta tags
      # cannot reach a release-time tag push without failing CI first.
      #
      # Two-part check:
      #   1. The expected regex literal appears verbatim in publish.yml (drift
      #      detector).
      #   2. The expected regex actually accepts / rejects the documented
      #      acceptance set.
      - name: Verify regex acceptance
        shell: bash
        run: |
          set -euo pipefail

          # Single source of truth for the regex under test. Must match the
          # literal in .github/workflows/publish.yml's "Parse tag" step.
          EXPECTED_REGEX='^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'

          # Drift detector: fail if publish.yml's regex literal no longer
          # matches what this guard tests.
          if ! grep -Fq "=~ ${EXPECTED_REGEX}" .github/workflows/publish.yml; then
            echo "Drift: publish.yml does not contain the expected regex literal." >&2
            echo "  Expected: =~ ${EXPECTED_REGEX}" >&2
            echo "If you intentionally changed the regex, update EXPECTED_REGEX in this job." >&2
            exit 1
          fi
          echo "Regex literal in publish.yml matches expected: ${EXPECTED_REGEX}"

          accept() {
            local tag="$1"
            if [[ ! "${tag}" =~ ${EXPECTED_REGEX} ]]; then
              echo "  FAIL: '${tag}' was rejected but should have been accepted" >&2
              return 1
            fi
            echo "  ok (accepted): ${tag}"
          }

          reject() {
            local tag="$1"
            if [[ "${tag}" =~ ${EXPECTED_REGEX} ]]; then
              echo "  FAIL: '${tag}' was accepted but should have been rejected" >&2
              return 1
            fi
            echo "  ok (rejected): ${tag}"
          }

          FAILED=0

          echo "--- Acceptance cases (must match) ---"
          accept "v1.2.0"           || FAILED=1   # clean release
          accept "v1.2.1-rc1"       || FAILED=1   # single pre-release id
          accept "v2.0.0-beta.3"    || FAILED=1   # dotted pre-release id
          accept "v0.1.0-alpha"     || FAILED=1   # alpha
          accept "v1.0.0-rc.1.2"    || FAILED=1   # multi-segment pre-release

          echo "--- Rejection cases (must NOT match) ---"
          reject "1.2.0"            || FAILED=1   # missing v prefix
          reject "v1.2"             || FAILED=1   # missing patch
          reject "v1.2.0+build1"    || FAILED=1   # build metadata not accepted
          reject "v1.2.0-"          || FAILED=1   # empty pre-release
          reject "v1.2.0-rc 1"      || FAILED=1   # space in pre-release
          reject ""                 || FAILED=1

          if [[ "${FAILED}" -ne 0 ]]; then
            echo "publish.yml tag regex acceptance check failed." >&2
            exit 1
          fi
          echo "All cases pass."

  source-comment-refs:
    name: Source comment refs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Fail a PR when an added/modified line introduces an unresolvable internal
    # reference (bare #N, Card #N, .agents/specs path, §N section) inside a
    # source comment, across backend/**/*.cs and frontend/src/**/*.{ts,tsx}.
    # The check is changed-lines-only (it does not require scrubbing the
    # existing tree) and matches only within comment context, so a hex colour
    # like "#123456" in code or a #region directive never false-positives.
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the changed-lines diff has a merge-base to work from.
          fetch-depth: 0
      - name: Self-test the linter
        run: bash tools/test-source-comment-refs.sh
      - name: Lint changed source comments
        shell: bash
        env:
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ -n "${PR_BASE}" ]; then
            # Pull request: diff against the PR's base branch.
            git fetch --no-tags origin "+refs/heads/${PR_BASE}:refs/remotes/origin/${PR_BASE}"
            BASE="origin/${PR_BASE}"
          else
            # Push: diff against the commit the branch pointed at before the push.
            BASE="${PUSH_BEFORE}"
          fi
          if [ -z "${BASE}" ] || [ "${BASE}" = "0000000000000000000000000000000000000000" ]; then
            echo "No resolvable diff base (new branch / initial push); self-test only."
            exit 0
          fi
          echo "Diffing against base: ${BASE}"
          python3 tools/lint-source-comment-refs.py --diff "${BASE}"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Type check
        run: npx tsc -b
      - name: Test
        run: npx vitest run --reporter=default --reporter=junit --outputFile.junit=junit.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-test-results
          path: frontend/junit.xml
      - name: Build
        run: npx vite build
