name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  extract-version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Parse tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG' does not match vX.Y.Z (v1 does not support pre-releases)" >&2
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Build frontend (once)
    needs: extract-version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npx vite build
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-matrix:
    name: Build ${{ matrix.rid }}
    needs: [extract-version, build-frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            caddy_os: windows
            caddy_arch: amd64
            caddy_ext: zip
            caddy_bin: caddy.exe
            ext: zip
          - rid: osx-arm64
            os: macos-latest
            caddy_os: mac
            caddy_arch: arm64
            caddy_ext: tar.gz
            caddy_bin: caddy
            ext: tar.gz
          - rid: osx-x64
            os: macos-latest
            caddy_os: mac
            caddy_arch: amd64
            caddy_ext: tar.gz
            caddy_bin: caddy
            ext: tar.gz
          - rid: linux-x64
            os: ubuntu-latest
            caddy_os: linux
            caddy_arch: amd64
            caddy_ext: tar.gz
            caddy_bin: caddy
            ext: tar.gz
          - rid: linux-arm64
            os: ubuntu-latest
            caddy_os: linux
            caddy_arch: arm64
            caddy_ext: tar.gz
            caddy_bin: caddy
            ext: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Pull the pre-built frontend into the API project so dotnet publish
      # picks it up as static web assets.
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/Collabhost.Api/wwwroot

      # Download the pinned Caddy archive and verify its upstream hash before
      # extraction. Mismatch fails the job hard. Caddy's published
      # caddy_<version>_checksums.txt uses SHA-512 (128 hex chars per line),
      # not SHA-256, so we hash the downloaded archive with sha512 and compare.
      - name: Download and verify Caddy
        shell: bash
        run: |
          set -euo pipefail

          VER=$(cat caddy.version | tr -d '[:space:]')
          ASSET="caddy_${VER}_${{ matrix.caddy_os }}_${{ matrix.caddy_arch }}.${{ matrix.caddy_ext }}"
          CHECKSUMS="caddy_${VER}_checksums.txt"
          BASE="https://github.com/caddyserver/caddy/releases/download/v${VER}"

          mkdir -p caddy-download
          cd caddy-download

          echo "Downloading Caddy asset: ${ASSET}"
          curl -fsSL --retry 3 --retry-delay 5 -o "${ASSET}" "${BASE}/${ASSET}"

          echo "Downloading Caddy checksums: ${CHECKSUMS}"
          curl -fsSL --retry 3 --retry-delay 5 -o "${CHECKSUMS}" "${BASE}/${CHECKSUMS}"

          # Pick sha512 tool (sha512sum on Linux/Git-Bash for Windows,
          # shasum -a 512 on macOS).
          if command -v sha512sum >/dev/null 2>&1; then
            SHA_CMD="sha512sum"
          else
            SHA_CMD="shasum -a 512"
          fi

          # Pull the expected hash from upstream's checksums.txt. Format is
          # standard sha512sum output: "<hex>  <filename>". Match on the
          # filename field exactly (awk $2) to avoid regex portability issues
          # between GNU grep (Linux, Git-Bash) and BSD grep (macOS).
          EXPECTED=$(awk -v name="${ASSET}" '$2 == name {print $1}' "${CHECKSUMS}")
          if [[ -z "${EXPECTED}" ]]; then
            echo "Could not find ${ASSET} in upstream checksums file" >&2
            cat "${CHECKSUMS}" >&2
            exit 1
          fi

          ACTUAL=$(${SHA_CMD} "${ASSET}" | awk '{print $1}')

          echo "Expected: ${EXPECTED}"
          echo "Actual:   ${ACTUAL}"

          if [[ "${EXPECTED}" != "${ACTUAL}" ]]; then
            echo "SHA-512 mismatch for ${ASSET} -- refusing to bundle" >&2
            exit 1
          fi

          echo "Caddy SHA-512 verified."

          # Extract only the caddy binary. Upstream archives also contain LICENSE
          # and README.md which we do not ship (we ship our own pinned copies).
          case "${ASSET}" in
            *.zip)
              unzip -o "${ASSET}" "${{ matrix.caddy_bin }}"
              ;;
            *.tar.gz)
              tar -xzf "${ASSET}" "${{ matrix.caddy_bin }}"
              ;;
          esac

          chmod +x "${{ matrix.caddy_bin }}" || true

      # Self-contained single-file publish. AssemblyName=collabhost renames the
      # output binary from Collabhost.Api[.exe] to collabhost[.exe] (spec §3.6,
      # locked decision 9). Not trimmed, not ReadyToRun (locked decision 3).
      - name: Publish
        shell: bash
        working-directory: backend
        env:
          VER: ${{ needs.extract-version.outputs.version }}
        run: |
          dotnet publish Collabhost.Api/Collabhost.Api.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:AssemblyName=collabhost \
            -p:Version=${VER} \
            -o "../publish/collabhost-${VER}-${{ matrix.rid }}"

      # Stage the archive contents: Collabhost binary (already in publish dir),
      # Caddy binary, INSTALL.md, LICENSES/caddy-{LICENSE,NOTICE}. appsettings.json
      # is emitted by dotnet publish from the Api project's appsettings.json.
      - name: Stage archive
        shell: bash
        env:
          VER: ${{ needs.extract-version.outputs.version }}
        run: |
          set -euo pipefail

          STAGE="publish/collabhost-${VER}-${{ matrix.rid }}"
          mkdir -p "${STAGE}/LICENSES"

          cp "caddy-download/${{ matrix.caddy_bin }}" "${STAGE}/"
          cp release-assets/INSTALL.md "${STAGE}/"
          cp release-assets/caddy-LICENSE "${STAGE}/LICENSES/"
          cp release-assets/caddy-NOTICE  "${STAGE}/LICENSES/"

      # Platform-appropriate archive. .zip on Windows via Compress-Archive,
      # .tar.gz everywhere else via native tar (locked decision 7).
      - name: Archive (zip)
        if: matrix.ext == 'zip'
        shell: pwsh
        env:
          VER: ${{ needs.extract-version.outputs.version }}
        run: |
          Compress-Archive -Path "publish/collabhost-$env:VER-${{ matrix.rid }}/*" `
                           -DestinationPath "collabhost-$env:VER-${{ matrix.rid }}.zip"

      - name: Archive (tar.gz)
        if: matrix.ext == 'tar.gz'
        shell: bash
        env:
          VER: ${{ needs.extract-version.outputs.version }}
        run: |
          tar -czf "collabhost-${VER}-${{ matrix.rid }}.tar.gz" \
            -C "publish/collabhost-${VER}-${{ matrix.rid }}" .

      # Per-archive SHA256 (locked decision 9). Portable `sha256sum -c` format.
      - name: Checksum
        shell: bash
        env:
          VER: ${{ needs.extract-version.outputs.version }}
        run: |
          set -euo pipefail

          ARCHIVE="collabhost-${VER}-${{ matrix.rid }}.${{ matrix.ext }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

          cat "${ARCHIVE}.sha256"

      # Upload archive + per-archive checksum to the GitHub Release that
      # triggered this workflow. --clobber makes re-runs idempotent.
      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ needs.extract-version.outputs.version }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "collabhost-${VER}-${{ matrix.rid }}.${{ matrix.ext }}" \
            "collabhost-${VER}-${{ matrix.rid }}.${{ matrix.ext }}.sha256" \
            --clobber

      # Per-leg checksum artifact for the aggregation job.
      - name: Upload per-leg checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksum-${{ matrix.rid }}
          path: collabhost-*-${{ matrix.rid }}.${{ matrix.ext }}.sha256
          retention-days: 1

  publish-checksums:
    name: Aggregate checksums.txt
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Download per-leg checksums
        uses: actions/download-artifact@v4
        with:
          pattern: checksum-*
          merge-multiple: true
          path: checksums-in

      - name: Aggregate
        shell: bash
        run: |
          set -euo pipefail
          cat checksums-in/*.sha256 > checksums.txt
          cat checksums.txt

      - name: Upload aggregated checksums to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" checksums.txt --clobber
