name: Install integration

# End-to-end validation that the published install scripts (docs/install.sh,
# docs/install.ps1) successfully install a real GitHub Release and that the
# resulting binary works as expected. Complements publish-dryrun.yml: dry-run
# validates archive build AND smokes the archive end-to-end on PRs (BUILD +
# PR-time CONSUME); this workflow validates the operator's actual install path
# (install scripts + GitHub Releases download) at release-time.
#
# Card #175. Motivated by 3 HIGH bugs that shipped past v0.1.0 pre-release
# gates because no test consumed both the installer's actual output and the
# archive's actual contract end-to-end:
#   F1 -- archive layout vs script extraction expectation
#   F2 -- Windows sha256sum -b binary-mode prefix
#   F3 -- backend ContentRootPath CWD-relative when run from $HOME
#
# Trigger posture (card #184): PR-time smoke moved into publish-dryrun.yml's
# archive-smoke job, where THIS PR's archive is tested against THIS PR's
# verification logic. install-integration is now release-time only -- it
# downloads the just-published GitHub Release archive and exercises the live
# install scripts against it. Pairing PR-side scripts with a previous release's
# archive (the old PR mode) is structurally guaranteed to break on any archive
# contract change (e.g., the wwwroot/ first-class-artifact addition), so that
# coupling has been dropped.
#
# Triggers:
#   - workflow_dispatch: manual runs, with required version override.
#   - workflow_run (on Publish success): post-release validation against the
#     just-shipped archives. Chained off publish.yml to avoid the
#     release.published parallel-fire race that caused all 4 legs to fail on
#     the v1.0.0 cut (card #211). publish.yml must complete successfully before
#     install-integration can start downloading archives.
#
# Verification target version:
#   - workflow_dispatch -> inputs.version (must be a tag that exists)
#   - workflow_run      -> github.event.workflow_run.head_branch (the tag name)
#
# Runners:
#   linux-x64    -> ubuntu-latest        (native)
#   linux-arm64  -> ubuntu-latest+QEMU   (Docker, linux/arm64 platform)
#   osx-x64      -> not supported; archive dropped in v0.1.1 (see CONTRIBUTING.md)
#   osx-arm64    -> macos-latest         (native, Apple Silicon)
#   win-x64      -> windows-latest       (native)

on:
  workflow_run:
    workflows: [Publish]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to install (e.g. v0.1.0). Required; the run will fail if absent.'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  resolve-version:
    name: Resolve target version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # For workflow_run: only proceed when publish.yml completed successfully on
    # a release event. This excludes failed publish runs and any PR-time
    # publish-dryrun.yml runs (different workflow name, but guard is defensive).
    # For workflow_dispatch: always proceed (operator-initiated manual retry).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'release')
    outputs:
      version: ${{ steps.resolve.outputs.VERSION }}
    steps:
      - name: Resolve target tag
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
          # workflow_run: head_branch carries the tag name (e.g. "v1.0.0") when
          # publish.yml was triggered by a release event on a tag push.
          # workflow_dispatch: this will be empty; INPUT_VERSION is used instead.
          RELEASE_TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          if [[ -n "${RELEASE_TAG:-}" ]]; then
            VERSION="${RELEASE_TAG}"
            SOURCE="workflow_run (publish.yml)"
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            VERSION="${INPUT_VERSION}"
            SOURCE="workflow_dispatch input"
          else
            echo "No release tag and no workflow_dispatch input provided." >&2
            exit 1
          fi

          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Resolved version '${VERSION}' is not a vX.Y.Z tag." >&2
            exit 1
          fi

          echo "Resolved target: ${VERSION} (source: ${SOURCE})"
          echo "VERSION=${VERSION}" >> "${GITHUB_OUTPUT}"

  install-unix:
    name: Install ${{ matrix.rid }}
    needs: resolve-version
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            collabhost_bin: collabhost
            caddy_bin: caddy
          - rid: osx-arm64
            os: macos-latest
            collabhost_bin: collabhost
            caddy_bin: caddy
    env:
      TAG: ${{ needs.resolve-version.outputs.version }}
      RID: ${{ matrix.rid }}
      COLLABHOST_BIN: ${{ matrix.collabhost_bin }}
      CADDY_BIN: ${{ matrix.caddy_bin }}
    steps:
      - uses: actions/checkout@v6

      # Run the live install script (the one this branch ships). Uses the
      # checked-out script, NOT the published one, so a PR change to the
      # script gets exercised. The --version flag pins the install target
      # to the resolved tag (latest published when triggered by PR).
      - name: First install
        shell: bash
        run: |
          set -euo pipefail
          bash docs/install.sh --version "${TAG}" --skip-path

      - name: Verify install layout
        shell: bash
        run: |
          set -euo pipefail
          INSTALL_DIR="${HOME}/.collabhost/bin"
          test -x "${INSTALL_DIR}/${COLLABHOST_BIN}" || { echo "Missing: ${COLLABHOST_BIN}" >&2; exit 1; }
          test -x "${INSTALL_DIR}/${CADDY_BIN}"      || { echo "Missing: ${CADDY_BIN}" >&2; exit 1; }
          test -f "${INSTALL_DIR}/appsettings.json"  || { echo "Missing: appsettings.json" >&2; exit 1; }
          test -f "${INSTALL_DIR}/INSTALL.md"        || { echo "Missing: INSTALL.md" >&2; exit 1; }
          test -d "${INSTALL_DIR}/LICENSES"          || { echo "Missing: LICENSES/" >&2; exit 1; }
          test -d "${INSTALL_DIR}/wwwroot"           || { echo "Missing: wwwroot/" >&2; exit 1; }
          test -f "${INSTALL_DIR}/wwwroot/index.html" || { echo "Missing: wwwroot/index.html" >&2; exit 1; }
          echo "Install layout verified."

      # collabhost --version must work and must work FROM $HOME (not the install
      # directory). Catches the F3 class -- ContentRootPath CWD-relative would
      # not affect --version directly, but running from $HOME confirms the
      # binary does not require its install dir as CWD for trivial commands.
      - name: collabhost --version (from $HOME)
        shell: bash
        run: |
          set -euo pipefail
          cd "${HOME}"
          OUT="$("${HOME}/.collabhost/bin/${COLLABHOST_BIN}" --version)"
          echo "${OUT}"
          # Output format is "Collabhost <tag-or-version>" -- match the prefix.
          # Don't tie to exact tag text in case Version stamping ever changes.
          echo "${OUT}" | grep -qi '^collabhost ' || {
            echo "Unexpected --version output: ${OUT}" >&2
            exit 1
          }

      # Reinstall preservation. Modify appsettings.json with a marker, run
      # the installer again, and confirm the marker survived. This catches
      # R2.1 §9.7 regressions where a careless installer change might
      # overwrite an operator-edited config on upgrade.
      #
      # Smart-merge gate assertion (card #213): the installer prints
      # "merge-appsettings:" output when the gate fires, regardless of whether
      # the merge produced changes. A silent install is the bug shape #213
      # tracked -- the regex missed and the gate fell through with no signal.
      # Capture installer stdout/stderr and assert the gate fired. NOTE: the
      # JSON-invalid marker is appended BEFORE the second install and survives
      # past it; the merge subcommand parses appsettings.json and would error
      # on the marker. To exercise both paths cleanly, do the marker check on
      # one install and the merge-fired check on a second clean reinstall.
      - name: Reinstall preserves appsettings.json
        shell: bash
        run: |
          set -euo pipefail
          INSTALL_DIR="${HOME}/.collabhost/bin"
          MARKER="// collabhost-install-test-marker $(date +%s)"
          echo "${MARKER}" >> "${INSTALL_DIR}/appsettings.json"
          mkdir -p "${INSTALL_DIR}/data"
          touch "${INSTALL_DIR}/data/sentinel.txt"

          bash docs/install.sh --version "${TAG}" --skip-path

          if ! grep -qF "${MARKER}" "${INSTALL_DIR}/appsettings.json"; then
            echo "Reinstall clobbered appsettings.json (marker missing)." >&2
            exit 1
          fi
          if [[ ! -f "${INSTALL_DIR}/data/sentinel.txt" ]]; then
            echo "Reinstall removed data/ directory." >&2
            exit 1
          fi
          echo "Reinstall preservation verified."

      - name: Smart-merge gate fires on reinstall
        shell: bash
        run: |
          set -euo pipefail
          INSTALL_DIR="${HOME}/.collabhost/bin"
          # Strip the JSON-invalid marker line so --merge-appsettings can parse
          # the file. The gate fires regardless of parseability, but we want the
          # merger to reach its summary line.
          if grep -q '^//' "${INSTALL_DIR}/appsettings.json"; then
            grep -v '^//' "${INSTALL_DIR}/appsettings.json" > "${INSTALL_DIR}/appsettings.json.clean"
            mv "${INSTALL_DIR}/appsettings.json.clean" "${INSTALL_DIR}/appsettings.json"
          fi

          INSTALL_LOG="${HOME}/install-merge-probe.log"
          # Capture combined stdout/stderr so we can verify either the success
          # summary (stdout) or the regex-miss warning (stderr) shows up.
          if ! bash docs/install.sh --version "${TAG}" --skip-path > "${INSTALL_LOG}" 2>&1; then
            cat "${INSTALL_LOG}" >&2
            exit 1
          fi
          echo "--- installer log ---"
          cat "${INSTALL_LOG}"
          echo "---------------------"

          # Same-version reinstall -- merge runs and prints "no changes to <path>".
          # If the regex missed (the #213 bug shape), the gate falls through and
          # the warning we added prints "skipping appsettings.json smart-merge".
          # Either string proves the gate executed; "no changes" proves the
          # merge subcommand actually ran. Assert the success path -- the warning
          # path is the bug we're guarding against.
          if ! grep -q 'merge-appsettings:' "${INSTALL_LOG}"; then
            echo "Smart-merge subcommand never ran on reinstall." >&2
            echo "Card #213 recurrence: the version-line regex did not match the" >&2
            echo "binary's --version output, so --merge-appsettings was skipped." >&2
            exit 1
          fi

          if grep -q 'skipping appsettings.json smart-merge' "${INSTALL_LOG}"; then
            echo "Smart-merge gate emitted the regex-miss warning." >&2
            echo "Card #213 recurrence: the version-line regex did not match the" >&2
            echo "binary's --version output. Inspect the installer log above." >&2
            exit 1
          fi

          echo "Smart-merge gate fired correctly on reinstall."

      # Bundled Caddy version. On workflow_dispatch the dispatch ref's
      # caddy.version is the comparator -- it may or may not match the
      # caddy.version baked into the release archive (releases ship with the
      # caddy.version at release-build time). We therefore EMIT the version
      # for inspection but only ENFORCE the match on release.published runs,
      # where the caddy.version on the released commit IS the comparator.
      - name: Caddy bundled version
        shell: bash
        run: |
          set -euo pipefail
          INSTALL_DIR="${HOME}/.collabhost/bin"
          ACTUAL="$("${INSTALL_DIR}/${CADDY_BIN}" version 2>/dev/null | awk '{print $1; exit}')"
          PINNED="v$(tr -d '[:space:]' < caddy.version)"
          echo "Bundled Caddy: ${ACTUAL}"
          echo "Pinned (this commit): ${PINNED}"
          # workflow_run is always release-mode (guard on resolve-version ensures
          # this). workflow_dispatch is always a manual/informational run where
          # the dispatch ref's caddy.version may differ from the release archive.
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            if [[ "${ACTUAL}" != "${PINNED}" ]]; then
              echo "Bundled Caddy version (${ACTUAL}) does not match pin (${PINNED})." >&2
              exit 1
            fi
            echo "Caddy version matches pin."
          else
            echo "Informational-only on workflow_dispatch runs (release archive may predate current pin)."
          fi

      # Admin-key bootstrap line. Start the binary, wait for the line, then
      # stop. The first-boot path against an empty database emits exactly one
      # 'Collabhost admin key:' line on stdout (per INSTALL.md §2). Run from
      # $HOME -- catches the F3 class (binary must read its own appsettings.json
      # via ContentRootPath = AppContext.BaseDirectory, not via shell CWD).
      - name: Admin-key bootstrap line
        shell: bash
        run: |
          set -euo pipefail
          INSTALL_DIR="${HOME}/.collabhost/bin"
          # Force a clean database so the first-boot bootstrap path runs.
          rm -rf "${INSTALL_DIR}/data"
          # Strip the marker we added in the previous step so JSON is valid.
          # (The bootstrap log line is what we want to see; bad config would
          # block the host from getting that far.)
          if grep -q '^//' "${INSTALL_DIR}/appsettings.json"; then
            grep -v '^//' "${INSTALL_DIR}/appsettings.json" > "${INSTALL_DIR}/appsettings.json.clean"
            mv "${INSTALL_DIR}/appsettings.json.clean" "${INSTALL_DIR}/appsettings.json"
          fi

          cd "${HOME}"
          LOG="${HOME}/firstboot.log"
          "${INSTALL_DIR}/${COLLABHOST_BIN}" > "${LOG}" 2>&1 &
          PID=$!
          # Poll for the bootstrap line up to 60s.
          FOUND=""
          for _ in $(seq 1 60); do
            if grep -q 'Collabhost admin key:' "${LOG}" 2>/dev/null; then
              FOUND=1
              break
            fi
            if ! kill -0 "${PID}" 2>/dev/null; then
              echo "Process exited before emitting admin-key line." >&2
              echo "--- log ---" >&2
              cat "${LOG}" >&2
              exit 1
            fi
            sleep 1
          done
          # HTTP smoke check (Portal). Always-on now -- this workflow is
          # release-time / dispatch-only, so the archive being installed is
          # always one this PR's scripts are paired with. PR-time smoke lives
          # in publish-dryrun.yml's archive-smoke job. Card #184.
          if [[ -n "${FOUND}" ]]; then
            PORT=58400
            for _ in $(seq 1 30); do
              if curl -fsSL "http://localhost:${PORT}/api/v1/status" >/dev/null 2>&1; then
                break
              fi
              sleep 1
            done
            STATUS_BODY="$(curl -fsSL "http://localhost:${PORT}/api/v1/status")"
            echo "${STATUS_BODY}" | grep -q '"status"' || {
              echo "Status endpoint did not return expected JSON: ${STATUS_BODY}" >&2
              exit 1
            }
            DASH_BODY="$(curl -fsSL "http://localhost:${PORT}/")"
            echo "${DASH_BODY}" | grep -qi '<!doctype html' || {
              echo "Dashboard root did not return HTML; wwwroot likely missing or unwired." >&2
              echo "${DASH_BODY}" | head -50 >&2
              exit 1
            }
            DEEP_BODY="$(curl -fsSL "http://localhost:${PORT}/apps")"
            echo "${DEEP_BODY}" | grep -qi '<!doctype html' || {
              echo "SPA fallback not wired: /apps returned non-HTML." >&2
              exit 1
            }
            echo "HTTP smoke check passed: status, root, deep link."
          fi

          # Bounded stop ladder: SIGINT -> 5s grace -> SIGTERM -> 3s grace -> SIGKILL.
          # Mirrors the linux-arm64 (QEMU) leg exactly. Worst-case bounded at ~8s.
          kill -INT "${PID}" 2>/dev/null || true
          for _ in $(seq 1 10); do kill -0 "${PID}" 2>/dev/null || break; sleep 0.5; done
          kill -TERM "${PID}" 2>/dev/null || true
          for _ in $(seq 1 6); do kill -0 "${PID}" 2>/dev/null || break; sleep 0.5; done
          kill -KILL "${PID}" 2>/dev/null || true
          wait "${PID}" 2>/dev/null || true

          if [[ -z "${FOUND}" ]]; then
            echo "Admin-key bootstrap line not seen within 60s." >&2
            echo "--- log tail ---" >&2
            tail -100 "${LOG}" >&2
            exit 1
          fi
          echo "Admin-key bootstrap line emitted."

  install-windows:
    name: Install win-x64
    needs: resolve-version
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      TAG: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: First install
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & docs/install.ps1 -Version $env:TAG -SkipPath

      - name: Verify install layout
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $InstallDir = Join-Path $HOME '.collabhost\bin'
          foreach ($name in @('collabhost.exe','caddy.exe','appsettings.json','INSTALL.md')) {
            if (-not (Test-Path -LiteralPath (Join-Path $InstallDir $name))) {
              throw "Missing: $name"
            }
          }
          if (-not (Test-Path -LiteralPath (Join-Path $InstallDir 'LICENSES') -PathType Container)) {
            throw "Missing: LICENSES/"
          }
          if (-not (Test-Path -LiteralPath (Join-Path $InstallDir 'wwwroot') -PathType Container)) {
            throw "Missing: wwwroot/"
          }
          if (-not (Test-Path -LiteralPath (Join-Path $InstallDir 'wwwroot\index.html') -PathType Leaf)) {
            throw "Missing: wwwroot\index.html"
          }
          Write-Host 'Install layout verified.'

      # collabhost --version run from $HOME -- catches F3 ContentRootPath class.
      - name: collabhost --version (from $HOME)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location $HOME
          $exe = Join-Path $HOME '.collabhost\bin\collabhost.exe'
          $out = & $exe --version
          Write-Host $out
          if ($out -notmatch '^(?i)collabhost ') {
            throw "Unexpected --version output: $out"
          }

      - name: Reinstall preserves appsettings.json
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $InstallDir = Join-Path $HOME '.collabhost\bin'
          $Settings = Join-Path $InstallDir 'appsettings.json'
          $Marker = "// collabhost-install-test-marker $([DateTimeOffset]::UtcNow.ToUnixTimeSeconds())"
          Add-Content -LiteralPath $Settings -Value $Marker
          New-Item -ItemType Directory -Path (Join-Path $InstallDir 'data') -Force | Out-Null
          New-Item -ItemType File -Path (Join-Path $InstallDir 'data\sentinel.txt') -Force | Out-Null

          & docs/install.ps1 -Version $env:TAG -SkipPath

          $content = Get-Content -LiteralPath $Settings -Raw
          if ($content -notmatch [regex]::Escape($Marker)) {
            throw 'Reinstall clobbered appsettings.json (marker missing).'
          }
          if (-not (Test-Path -LiteralPath (Join-Path $InstallDir 'data\sentinel.txt'))) {
            throw 'Reinstall removed data/ directory.'
          }
          Write-Host 'Reinstall preservation verified.'

      # Smart-merge gate assertion (card #213): captured installer output must
      # contain "merge-appsettings:" and must NOT contain the regex-miss warning.
      # See the linux/macOS leg's identical step for the full rationale.
      - name: Smart-merge gate fires on reinstall
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $InstallDir = Join-Path $HOME '.collabhost\bin'
          $Settings = Join-Path $InstallDir 'appsettings.json'

          # Strip the JSON-invalid marker so --merge-appsettings can parse the file.
          $lines = Get-Content -LiteralPath $Settings | Where-Object { $_ -notmatch '^\s*//' }
          Set-Content -LiteralPath $Settings -Value $lines

          $InstallLog = Join-Path $HOME 'install-merge-probe.log'
          # 2>&1 in pwsh combines stderr into the success stream so a single
          # capture covers both the merge summary (stdout) and the warning
          # surface (stderr).
          & docs/install.ps1 -Version $env:TAG -SkipPath *>&1 | Tee-Object -FilePath $InstallLog | Out-Null

          $log = Get-Content -LiteralPath $InstallLog -Raw
          Write-Host '--- installer log ---'
          Write-Host $log
          Write-Host '---------------------'

          if ($log -notmatch 'merge-appsettings:') {
            throw "Smart-merge subcommand never ran on reinstall. Card #213 recurrence: the version-line regex did not match the binary's --version output."
          }
          if ($log -match 'skipping appsettings.json smart-merge') {
            throw "Smart-merge gate emitted the regex-miss warning. Card #213 recurrence: inspect the installer log above."
          }

          Write-Host 'Smart-merge gate fired correctly on reinstall.'

      - name: Caddy bundled version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $InstallDir = Join-Path $HOME '.collabhost\bin'
          $caddy = Join-Path $InstallDir 'caddy.exe'
          $raw = & $caddy version 2>$null
          $actual = ($raw -split '\s+')[0]
          $pinned = 'v' + (Get-Content -LiteralPath 'caddy.version' -Raw).Trim()
          Write-Host "Bundled Caddy: $actual"
          Write-Host "Pinned (this commit): $pinned"
          # workflow_run is always release-mode; workflow_dispatch is manual/informational.
          if ($env:GITHUB_EVENT_NAME -ne 'workflow_dispatch') {
            if ($actual -ne $pinned) {
              throw "Bundled Caddy version ($actual) does not match pin ($pinned)."
            }
            Write-Host 'Caddy version matches pin.'
          } else {
            Write-Host 'Informational-only on workflow_dispatch runs (release archive may predate current pin).'
          }

      - name: Admin-key bootstrap line
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $InstallDir = Join-Path $HOME '.collabhost\bin'
          $exe = Join-Path $InstallDir 'collabhost.exe'
          $Settings = Join-Path $InstallDir 'appsettings.json'

          # Clean database for first-boot bootstrap path.
          if (Test-Path -LiteralPath (Join-Path $InstallDir 'data')) {
            Remove-Item -LiteralPath (Join-Path $InstallDir 'data') -Recurse -Force
          }
          # Strip JSON-invalid marker line from previous step.
          $lines = Get-Content -LiteralPath $Settings | Where-Object { $_ -notmatch '^\s*//' }
          Set-Content -LiteralPath $Settings -Value $lines

          Set-Location $HOME
          $log = Join-Path $HOME 'firstboot.log'
          if (Test-Path -LiteralPath $log) { Remove-Item -LiteralPath $log -Force }

          $proc = Start-Process -FilePath $exe `
                                -RedirectStandardOutput $log `
                                -RedirectStandardError (Join-Path $HOME 'firstboot.err.log') `
                                -PassThru -WindowStyle Hidden
          $found = $false
          for ($i = 0; $i -lt 60; $i++) {
            if ((Test-Path -LiteralPath $log) -and (Select-String -LiteralPath $log -Pattern 'Collabhost admin key:' -Quiet)) {
              $found = $true
              break
            }
            if ($proc.HasExited) {
              Write-Host '--- stdout ---'
              if (Test-Path -LiteralPath $log) { Get-Content -LiteralPath $log }
              Write-Host '--- stderr ---'
              if (Test-Path -LiteralPath (Join-Path $HOME 'firstboot.err.log')) { Get-Content -LiteralPath (Join-Path $HOME 'firstboot.err.log') }
              throw 'Process exited before emitting admin-key line.'
            }
            Start-Sleep -Seconds 1
          }
          # HTTP smoke check (Portal). Always-on now -- see Unix leg comment. Card #184.
          if ($found) {
            $port = 58400
            $ok = $false
            for ($i = 0; $i -lt 30; $i++) {
              try {
                Invoke-WebRequest -UseBasicParsing -Uri "http://localhost:$port/api/v1/status" -ErrorAction Stop | Out-Null
                $ok = $true
                break
              } catch {
                Start-Sleep -Seconds 1
              }
            }
            if (-not $ok) { throw 'Status endpoint never came up after 30s.' }

            $status = Invoke-WebRequest -UseBasicParsing -Uri "http://localhost:$port/api/v1/status"
            if ($status.Content -notmatch '"status"') { throw "Unexpected /status body: $($status.Content)" }

            $dash = Invoke-WebRequest -UseBasicParsing -Uri "http://localhost:$port/"
            if ($dash.Content -notmatch '(?i)<!doctype html') { throw 'Dashboard root did not return HTML.' }

            $deep = Invoke-WebRequest -UseBasicParsing -Uri "http://localhost:$port/apps"
            if ($deep.Content -notmatch '(?i)<!doctype html') { throw 'SPA fallback not wired: /apps returned non-HTML.' }

            Write-Host 'HTTP smoke check passed: status, root, deep link.'
          }

          # Stop the process (Windows has no clean SIGINT for our P/Invoke
          # process group from PS without GenerateConsoleCtrlEvent gymnastics;
          # Stop-Process is sufficient -- the integration test's success
          # criterion is the bootstrap line, not graceful shutdown).
          if (-not $proc.HasExited) {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            $proc.WaitForExit(5000) | Out-Null
          }

          if (-not $found) {
            Write-Host '--- stdout tail ---'
            if (Test-Path -LiteralPath $log) { Get-Content -LiteralPath $log -Tail 100 }
            throw 'Admin-key bootstrap line not seen within 60s.'
          }
          Write-Host 'Admin-key bootstrap line emitted.'

  install-linux-arm64:
    name: Install linux-arm64 (QEMU)
    # QEMU emulation costs ~10 min per run. Always runs now -- this workflow
    # is release-time / dispatch-only (PR-time smoke moved to publish-dryrun).
    needs: resolve-version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TAG: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      # Run the entire installer + verification suite inside a linux/arm64
      # Debian container. QEMU emulation is slow (5-15x slower than native),
      # so this leg has a much larger timeout. fail-fast is disabled at the
      # matrix level; this dedicated job is allowed to lag the native legs
      # without blocking them.
      #
      # No first-class GitHub-hosted linux-arm64 runner exists, and a
      # self-hosted runner is impractical for a small project. QEMU on
      # ubuntu-latest is the pragmatic compromise. Documented in
      # CONTRIBUTING.md release-process section.
      - name: Install + verify under linux/arm64
        shell: bash
        env:
          TAG: ${{ needs.resolve-version.outputs.version }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          docker run --rm --platform linux/arm64 \
            -v "${PWD}:/work" \
            -w /work \
            -e TAG \
            -e GITHUB_EVENT_NAME \
            debian:bookworm-slim \
            bash -euxo pipefail -c '
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends \
                ca-certificates curl tar gzip mawk grep coreutils libicu72 >/dev/null

              export HOME=/root
              cd /tmp

              # First install.
              bash /work/docs/install.sh --version "${TAG}" --skip-path

              INSTALL_DIR="${HOME}/.collabhost/bin"
              test -x "${INSTALL_DIR}/collabhost"
              test -x "${INSTALL_DIR}/caddy"
              test -f "${INSTALL_DIR}/appsettings.json"
              test -f "${INSTALL_DIR}/INSTALL.md"
              test -d "${INSTALL_DIR}/LICENSES"
              test -d "${INSTALL_DIR}/wwwroot"
              test -f "${INSTALL_DIR}/wwwroot/index.html"
              echo "Install layout verified (linux-arm64)."

              # --version from $HOME.
              cd "${HOME}"
              OUT="$("${INSTALL_DIR}/collabhost" --version)"
              echo "${OUT}"
              echo "${OUT}" | grep -qi "^collabhost "

              # Reinstall preservation.
              MARKER="// collabhost-install-test-marker-arm64 $(date +%s)"
              echo "${MARKER}" >> "${INSTALL_DIR}/appsettings.json"
              mkdir -p "${INSTALL_DIR}/data"
              touch "${INSTALL_DIR}/data/sentinel.txt"
              bash /work/docs/install.sh --version "${TAG}" --skip-path
              grep -qF "${MARKER}" "${INSTALL_DIR}/appsettings.json"
              test -f "${INSTALL_DIR}/data/sentinel.txt"
              echo "Reinstall preservation verified (linux-arm64)."

              # Smart-merge gate assertion (card #213). Strip the JSON-invalid
              # marker first so --merge-appsettings can parse the file, then
              # capture installer output and assert "merge-appsettings:" appears
              # and the regex-miss warning does NOT appear. See the native-leg
              # equivalent for the full rationale.
              if grep -q "^//" "${INSTALL_DIR}/appsettings.json"; then
                grep -v "^//" "${INSTALL_DIR}/appsettings.json" > "${INSTALL_DIR}/appsettings.json.clean"
                mv "${INSTALL_DIR}/appsettings.json.clean" "${INSTALL_DIR}/appsettings.json"
              fi
              INSTALL_LOG="${HOME}/install-merge-probe.log"
              if ! bash /work/docs/install.sh --version "${TAG}" --skip-path > "${INSTALL_LOG}" 2>&1; then
                cat "${INSTALL_LOG}" >&2
                exit 1
              fi
              echo "--- installer log ---"
              cat "${INSTALL_LOG}"
              echo "---------------------"
              if ! grep -q "merge-appsettings:" "${INSTALL_LOG}"; then
                echo "Smart-merge subcommand never ran on reinstall (linux-arm64)." >&2
                echo "Card #213 recurrence: the version-line regex did not match the" >&2
                echo "binary'\''s --version output." >&2
                exit 1
              fi
              if grep -q "skipping appsettings.json smart-merge" "${INSTALL_LOG}"; then
                echo "Smart-merge gate emitted the regex-miss warning (linux-arm64)." >&2
                echo "Card #213 recurrence: inspect the installer log above." >&2
                exit 1
              fi
              echo "Smart-merge gate fired correctly on reinstall (linux-arm64)."

              # Caddy version (enforced on workflow_run/release; informational on workflow_dispatch).
              ACTUAL="$("${INSTALL_DIR}/caddy" version 2>/dev/null | awk "{print \$1; exit}")"
              PINNED="v$(tr -d "[:space:]" < /work/caddy.version)"
              echo "Bundled Caddy: ${ACTUAL}"
              echo "Pinned: ${PINNED}"
              if [ "${GITHUB_EVENT_NAME:-}" != "workflow_dispatch" ]; then
                [ "${ACTUAL}" = "${PINNED}" ] || { echo "Caddy version mismatch" >&2; exit 1; }
              fi

              # Admin-key bootstrap.
              rm -rf "${INSTALL_DIR}/data"
              # Strip marker line so JSON is valid.
              if grep -q "^//" "${INSTALL_DIR}/appsettings.json"; then
                grep -v "^//" "${INSTALL_DIR}/appsettings.json" > "${INSTALL_DIR}/appsettings.json.clean"
                mv "${INSTALL_DIR}/appsettings.json.clean" "${INSTALL_DIR}/appsettings.json"
              fi
              cd "${HOME}"
              LOG="${HOME}/firstboot.log"
              "${INSTALL_DIR}/collabhost" > "${LOG}" 2>&1 &
              PID=$!
              FOUND=""
              # QEMU emulation -- give startup more headroom than native legs.
              for _ in $(seq 1 180); do
                if grep -q "Collabhost admin key:" "${LOG}" 2>/dev/null; then
                  FOUND=1
                  break
                fi
                if ! kill -0 "${PID}" 2>/dev/null; then
                  echo "Process exited before emitting admin-key line." >&2
                  cat "${LOG}" >&2
                  exit 1
                fi
                sleep 1
              done
              # HTTP smoke check (Portal). Always-on now -- see native-leg comment. Card #184.
              if [ -n "${FOUND}" ]; then
                PORT=58400
                for _ in $(seq 1 60); do
                  if curl -fsSL "http://localhost:${PORT}/api/v1/status" >/dev/null 2>&1; then
                    break
                  fi
                  sleep 1
                done
                STATUS_BODY="$(curl -fsSL "http://localhost:${PORT}/api/v1/status")"
                echo "${STATUS_BODY}" | grep -q "\"status\"" || { echo "Unexpected /status body" >&2; exit 1; }
                DASH_BODY="$(curl -fsSL "http://localhost:${PORT}/")"
                echo "${DASH_BODY}" | grep -qi "<!doctype html" || { echo "Dashboard root not HTML" >&2; exit 1; }
                DEEP_BODY="$(curl -fsSL "http://localhost:${PORT}/apps")"
                echo "${DEEP_BODY}" | grep -qi "<!doctype html" || { echo "SPA fallback not wired" >&2; exit 1; }
                echo "HTTP smoke check passed (linux-arm64)."
              fi

              kill -INT "${PID}" 2>/dev/null || true
              for _ in $(seq 1 10); do kill -0 "${PID}" 2>/dev/null || break; sleep 0.5; done
              kill -TERM "${PID}" 2>/dev/null || true
              for _ in $(seq 1 6); do kill -0 "${PID}" 2>/dev/null || break; sleep 0.5; done
              kill -KILL "${PID}" 2>/dev/null || true
              wait "${PID}" 2>/dev/null || true
              if [ -z "${FOUND}" ]; then
                echo "Admin-key bootstrap line not seen within 180s (QEMU)." >&2
                tail -100 "${LOG}" >&2
                exit 1
              fi
              echo "Admin-key bootstrap line emitted (linux-arm64)."
            '
