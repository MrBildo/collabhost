name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  extract-version:
    name: Extract version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Parse tag
        id: version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          # SemVer 2.0 §9 pre-release identifier: dot-separated alphanumerics
          # (and hyphens). Examples: v1.2.0, v1.2.1-rc1, v2.0.0-beta.3,
          # v2.0.0-alpha.1.beta. Build metadata (+...) is intentionally NOT
          # accepted -- archive filenames use VERSION as a path segment, and
          # '+' in a filename is friction across tools (URL-encoding, shell
          # quoting). If we ever need build-metadata tags, revisit then.
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Tag '${TAG}' does not match vX.Y.Z or vX.Y.Z-<pre-release> (per SemVer 2.0 §9)" >&2
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> "${GITHUB_OUTPUT}"

  build-frontend:
    name: Build frontend (once)
    needs: extract-version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npx vite build
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  build-matrix:
    name: Build ${{ matrix.rid }}
    needs: [extract-version, build-frontend]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            goos: windows
            goarch: amd64
            caddy_bin: caddy.exe
            collabhost_bin: collabhost.exe
            ext: zip
          - rid: osx-arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            caddy_bin: caddy
            collabhost_bin: collabhost
            ext: tar.gz
          - rid: linux-x64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            caddy_bin: caddy
            collabhost_bin: collabhost
            ext: tar.gz
          - rid: linux-arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            caddy_bin: caddy
            collabhost_bin: collabhost
            ext: tar.gz
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Pull the pre-built frontend into the API project so dotnet publish
      # picks it up as static web assets.
      - name: Download frontend artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: backend/Collabhost.Api/wwwroot

      # ---------------------------------------------------------------------
      # Caddy bundling -- replaced the upstream-binary download with an in-CI
      # `xcaddy build` so we can bake `caddy-dns/cloudflare` (and any future
      # plugins listed in caddy-plugins.txt) into the shipped binary. Vanilla
      # Caddy lacks DNS-01 providers; without this, ACME issuance against
      # *.collabot.dev would fail at runtime with "unknown module
      # dns.providers.cloudflare".
      #
      # Pinned versions:
      #   caddy.version     -- Caddy core (e.g. 2.11.2)
      #   xcaddy.version    -- xcaddy itself (e.g. 0.4.5)
      #   caddy-plugins.txt -- one plugin per non-comment line:
      #     <go-module-path>  <version>  <caddy-module-id>
      #
      # The third column is the Caddy module ID (e.g. `dns.providers.cloudflare`)
      # that `caddy list-modules` prints once the plugin is loaded; the post-
      # build verify step greps for it to assert the plugin actually got baked
      # in. The build runs natively on Windows/macOS legs and cross-compiles
      # for linux-arm64 from the x64 ubuntu runner via GOOS/GOARCH.
      # ---------------------------------------------------------------------
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: false

      - name: Install xcaddy
        shell: bash
        run: |
          set -euo pipefail
          XCADDY_VER=$(tr -d '[:space:]' < xcaddy.version)
          echo "Installing xcaddy v${XCADDY_VER}"
          go install "github.com/caddyserver/xcaddy/cmd/xcaddy@v${XCADDY_VER}"
          # Surface the GOPATH/bin location once for the leg log; subsequent
          # steps invoke xcaddy through the absolute path.
          go env GOPATH

      - name: Set up qemu (linux-arm64 only)
        # Only the linux-arm64 leg cross-compiles; we need qemu-user-static
        # so the post-build `caddy list-modules` assertion can execute the
        # foreign binary on the x64 runner. Other legs build natively.
        if: matrix.rid == 'linux-arm64'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user-static
          # Sanity-check that binfmt routes aarch64 ELFs through qemu.
          if [ ! -e /proc/sys/fs/binfmt_misc/qemu-aarch64 ]; then
            echo "qemu-aarch64 binfmt registration missing" >&2
            exit 1
          fi

      - name: Build Caddy with plugins (xcaddy)
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CADDY_BIN: ${{ matrix.caddy_bin }}
        run: |
          set -euo pipefail

          CADDY_VER=$(tr -d '[:space:]' < caddy.version)
          # `go install` writes xcaddy(.exe) into GOPATH/bin. Pick whichever
          # exists -- Windows runners install xcaddy.exe; Linux/macOS get the
          # bare name. Git-Bash on Windows does NOT auto-append .exe for
          # explicit-path invocations, so we resolve the suffix here.
          GOPATH_BIN="$(go env GOPATH)/bin"
          if [[ -x "${GOPATH_BIN}/xcaddy.exe" ]]; then
            XCADDY="${GOPATH_BIN}/xcaddy.exe"
          elif [[ -x "${GOPATH_BIN}/xcaddy" ]]; then
            XCADDY="${GOPATH_BIN}/xcaddy"
          else
            echo "xcaddy not found in ${GOPATH_BIN}" >&2
            exit 1
          fi

          # Assemble --with flags from caddy-plugins.txt. Skip blank lines and
          # comments. First two columns (module + version) are the build
          # input; the third (caddy-module-id) is consumed by the verify step.
          WITH_ARGS=()
          while IFS= read -r line || [[ -n "${line}" ]]; do
            trimmed="${line#"${line%%[![:space:]]*}"}"
            [[ -z "${trimmed}" || "${trimmed:0:1}" == "#" ]] && continue
            # shellcheck disable=SC2206
            parts=( ${trimmed} )
            if (( ${#parts[@]} < 2 )); then
              echo "Malformed plugin line: ${line}" >&2
              exit 1
            fi
            WITH_ARGS+=( --with "${parts[0]}@${parts[1]}" )
          done < caddy-plugins.txt

          if (( ${#WITH_ARGS[@]} == 0 )); then
            echo "No plugins declared in caddy-plugins.txt -- xcaddy needs at least one --with" >&2
            exit 1
          fi

          mkdir -p caddy-build
          OUTPUT="caddy-build/${CADDY_BIN}"

          echo "Building Caddy v${CADDY_VER} for GOOS=${GOOS} GOARCH=${GOARCH}"
          echo "Plugins: ${WITH_ARGS[*]}"
          "${XCADDY}" build "v${CADDY_VER}" "${WITH_ARGS[@]}" --output "${OUTPUT}"

          if [[ "${GOOS}" != "windows" ]]; then
            chmod +x "${OUTPUT}"
          fi
          ls -la "${OUTPUT}"

      - name: Verify Caddy modules
        shell: bash
        env:
          CADDY_BIN: ${{ matrix.caddy_bin }}
        run: |
          set -euo pipefail

          BIN="caddy-build/${CADDY_BIN}"
          # Print version + build info up-front so a build with no plugins
          # surfaces visibly in the log.
          "${BIN}" version
          MODULES="$("${BIN}" list-modules)"

          # Walk caddy-plugins.txt's third column and assert each Caddy module
          # ID is present in `caddy list-modules` output. Missing module fails
          # the leg -- a vanilla build would silently strip the plugin
          # otherwise.
          MISSING=0
          while IFS= read -r line || [[ -n "${line}" ]]; do
            trimmed="${line#"${line%%[![:space:]]*}"}"
            [[ -z "${trimmed}" || "${trimmed:0:1}" == "#" ]] && continue
            # shellcheck disable=SC2206
            parts=( ${trimmed} )
            (( ${#parts[@]} >= 3 )) || continue
            module_id="${parts[2]}"
            if grep -Fxq "${module_id}" <<< "${MODULES}"; then
              echo "  ok: ${module_id}"
            else
              echo "  MISSING: ${module_id}" >&2
              MISSING=1
            fi
          done < caddy-plugins.txt

          if [[ "${MISSING}" -ne 0 ]]; then
            echo "One or more plugins missing from built Caddy binary." >&2
            echo "--- caddy list-modules ---" >&2
            echo "${MODULES}" >&2
            exit 1
          fi

          echo "All declared plugins are baked into the binary."

      # Self-contained single-file publish. The output binary is renamed from
      # Collabhost.Api[.exe] to collabhost[.exe] by a PublishSingleFile-scoped
      # <AssemblyName> property in Collabhost.Api.csproj. That property lives in
      # the csproj rather than here as -p:AssemblyName=collabhost because a CLI
      # MSBuild global property propagates to every project in the restore graph
      # (Collabhost.ServiceDefaults in our case), which makes NuGet restore fail
      # with "Ambiguous project name 'collabhost'". Not trimmed, not ReadyToRun.
      - name: Publish
        shell: bash
        working-directory: backend
        env:
          VER: ${{ needs.extract-version.outputs.version }}
          RID: ${{ matrix.rid }}
        run: |
          set -euo pipefail

          dotnet publish Collabhost.Api/Collabhost.Api.csproj \
            -c Release \
            -r "${RID}" \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:Version="${VER}" \
            -o "../publish/collabhost-${VER}-${RID}"

      # Explicit allow-list re-stage. Copy ONLY the six contract items from the
      # publish output into a clean archive-stage directory. This is the
      # contract boundary for what ships: anything dotnet publish emits that
      # isn't listed here (collabhost.pdb, *.staticwebassets.endpoints.json,
      # future SDK-emitted manifests, scratch files) is dropped. The archive
      # contract is enumerated here, not inferred from publish-flag
      # combinations.
      - name: Stage archive
        shell: bash
        env:
          VER: ${{ needs.extract-version.outputs.version }}
          RID: ${{ matrix.rid }}
          CADDY_BIN: ${{ matrix.caddy_bin }}
          COLLABHOST_BIN: ${{ matrix.collabhost_bin }}
        run: |
          set -euo pipefail

          PUB="publish/collabhost-${VER}-${RID}"
          STAGE="archive-stage/collabhost-${VER}-${RID}"

          rm -rf "${STAGE}"
          mkdir -p "${STAGE}/LICENSES"

          # Seven contract items: collabhost, caddy, appsettings.json,
          # INSTALL.md, LICENSES/caddy-LICENSE, LICENSES/caddy-NOTICE, wwwroot/.
          cp "${PUB}/${COLLABHOST_BIN}"         "${STAGE}/"
          cp "${PUB}/appsettings.json"          "${STAGE}/"
          cp "caddy-build/${CADDY_BIN}"         "${STAGE}/"
          cp "release-assets/INSTALL.md"        "${STAGE}/"
          cp "release-assets/caddy-LICENSE"     "${STAGE}/LICENSES/"
          cp "release-assets/caddy-NOTICE"      "${STAGE}/LICENSES/"
          # wwwroot/ is the dashboard's static assets. dotnet publish emits it because
          # build-frontend populates backend/Collabhost.Api/wwwroot before publish.
          cp -R "${PUB}/wwwroot"                "${STAGE}/"

          # Unix archives must carry the execute bit on the collabhost binary.
          # PublishSingleFile on Linux/macOS sets +x on the emitted binary, but
          # this defensive chmod guarantees the archived entry matches what
          # operators need on extraction regardless of SDK behavior drift.
          if [[ "${RID}" != win-x64 ]]; then
            chmod +x "${STAGE}/${COLLABHOST_BIN}"
            chmod +x "${STAGE}/${CADDY_BIN}"
          fi

          echo "Staged contents:"
          ls -la "${STAGE}"
          ls -la "${STAGE}/LICENSES"

      # Platform-appropriate archive. .zip on Windows via Compress-Archive,
      # .tar.gz everywhere else via native tar (locked decision 7). Both use
      # the archive-stage directory as input, which contains exactly the
      # six allow-listed items.
      - name: Archive (zip)
        if: matrix.ext == 'zip'
        shell: pwsh
        env:
          VER: ${{ needs.extract-version.outputs.version }}
          RID: ${{ matrix.rid }}
        run: |
          $stage = "archive-stage/collabhost-$env:VER-$env:RID"
          Compress-Archive -Path "$stage/*" `
                           -DestinationPath "collabhost-$env:VER-$env:RID.zip"

      - name: Archive (tar.gz)
        if: matrix.ext == 'tar.gz'
        shell: bash
        env:
          VER: ${{ needs.extract-version.outputs.version }}
          RID: ${{ matrix.rid }}
          CADDY_BIN: ${{ matrix.caddy_bin }}
          COLLABHOST_BIN: ${{ matrix.collabhost_bin }}
        run: |
          set -euo pipefail

          STAGE="archive-stage/collabhost-${VER}-${RID}"
          ARCHIVE="collabhost-${VER}-${RID}.tar.gz"

          # Explicit file list rather than `tar -C dir .` globbing. Keeps the
          # archive contract enforced at archival time: only the six named
          # items land in the tar stream.
          tar -czf "${ARCHIVE}" \
            -C "${STAGE}" \
            "${COLLABHOST_BIN}" \
            appsettings.json \
            "${CADDY_BIN}" \
            INSTALL.md \
            LICENSES/caddy-LICENSE \
            LICENSES/caddy-NOTICE \
            wwwroot

      # Contract verification: open the archive in a temp directory and
      # assert all six items are present. Fails the leg hard if anything is
      # missing. Cheap safety net for a workflow that can't be dry-run.
      - name: Verify archive contents
        shell: bash
        env:
          VER: ${{ needs.extract-version.outputs.version }}
          RID: ${{ matrix.rid }}
          EXT: ${{ matrix.ext }}
          CADDY_BIN: ${{ matrix.caddy_bin }}
          COLLABHOST_BIN: ${{ matrix.collabhost_bin }}
        run: |
          set -euo pipefail

          ARCHIVE="collabhost-${VER}-${RID}.${EXT}"
          VERIFY_DIR="verify-${RID}"

          rm -rf "${VERIFY_DIR}"
          mkdir -p "${VERIFY_DIR}"

          case "${ARCHIVE}" in
            *.zip)    unzip -q "${ARCHIVE}" -d "${VERIFY_DIR}" ;;
            *.tar.gz) tar -xzf "${ARCHIVE}" -C "${VERIFY_DIR}" ;;
          esac

          echo "Archive listing:"
          (cd "${VERIFY_DIR}" && find . -type f | sort)

          # Flat-layout assertion: the six contract items must be at the
          # archive root, not nested under a wrapping "collabhost-*" dir.
          # The installer scripts (docs/install.sh, docs/install.ps1) copy
          # straight from the extract directory and assume flat layout.
          # This check locks that contract at archival time.
          if [[ -d "${VERIFY_DIR}/collabhost-${VER}-${RID}" ]]; then
            echo "Archive layout unexpected: found wrapping directory collabhost-${VER}-${RID}/ at archive root." >&2
            echo "Archives must be flat (contract items at root). Installer scripts assume flat layout." >&2
            exit 1
          fi

          MISSING=0
          for path in \
            "${COLLABHOST_BIN}" \
            "appsettings.json" \
            "${CADDY_BIN}" \
            "INSTALL.md" \
            "LICENSES/caddy-LICENSE" \
            "LICENSES/caddy-NOTICE"
          do
            if [[ ! -f "${VERIFY_DIR}/${path}" ]]; then
              echo "MISSING: ${path}" >&2
              MISSING=1
            fi
          done

          # wwwroot/ is a directory; verify presence + index.html + non-empty assets/.
          if [[ ! -d "${VERIFY_DIR}/wwwroot" ]]; then
            echo "MISSING: wwwroot/" >&2
            MISSING=1
          elif [[ ! -f "${VERIFY_DIR}/wwwroot/index.html" ]]; then
            echo "MISSING: wwwroot/index.html" >&2
            MISSING=1
          elif [[ -z "$(ls -A "${VERIFY_DIR}/wwwroot/assets" 2>/dev/null)" ]]; then
            echo "MISSING: wwwroot/assets/* (directory empty)" >&2
            MISSING=1
          fi

          if [[ "${MISSING}" -ne 0 ]]; then
            echo "Archive contract verification failed." >&2
            exit 1
          fi

          echo "Archive contract verified: flat layout, 7/7 items present."

      # Per-archive SHA256 (locked decision 9). Portable `sha256sum -c` format.
      - name: Checksum
        shell: bash
        env:
          VER: ${{ needs.extract-version.outputs.version }}
          RID: ${{ matrix.rid }}
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail

          ARCHIVE="collabhost-${VER}-${RID}.${EXT}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

          cat "${ARCHIVE}.sha256"

      # Log any pre-existing assets on the release for this leg before
      # clobbering. Re-publishing the same tag (or re-triggering the workflow
      # on an existing release) replaces assets silently via --clobber. This
      # step makes the overwrite visible in the workflow log. Spec §16.2
      # covers the operator posture: re-cut to the next patch version rather
      # than re-publishing a tag.
      - name: Log existing release assets (pre-upload)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          VER: ${{ needs.extract-version.outputs.version }}
          RID: ${{ matrix.rid }}
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail

          ARCHIVE="collabhost-${VER}-${RID}.${EXT}"
          CHECKSUM="${ARCHIVE}.sha256"

          echo "Checking for existing assets on release ${TAG} that would be clobbered..."
          EXISTING=$(gh release view "${TAG}" --repo MrBildo/collabhost --json assets --jq \
            ".assets[] | select(.name == \"${ARCHIVE}\" or .name == \"${CHECKSUM}\") | .name" \
            || true)

          if [[ -n "${EXISTING}" ]]; then
            echo "WARNING: the following asset(s) already exist on ${TAG} and will be replaced by --clobber:"
            echo "${EXISTING}"
            echo "If this is not a matrix re-run, consider re-cutting to the next patch version (spec §16.2)."
          else
            echo "No pre-existing assets for this leg on ${TAG}."
          fi

      # Upload archive + per-archive checksum to the GitHub Release that
      # triggered this workflow. --clobber makes re-runs idempotent.
      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          VER: ${{ needs.extract-version.outputs.version }}
          RID: ${{ matrix.rid }}
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail

          gh release upload "${TAG}" \
            "collabhost-${VER}-${RID}.${EXT}" \
            "collabhost-${VER}-${RID}.${EXT}.sha256" \
            --repo MrBildo/collabhost \
            --clobber

      # Per-leg checksum artifact for the aggregation job. Bumped to 7 days
      # so `publish-checksums` can be re-run after an aggregation failure
      # discovered later in the week without re-running the matrix.
      - name: Upload per-leg checksum artifact
        uses: actions/upload-artifact@v6
        with:
          name: checksum-${{ matrix.rid }}
          path: collabhost-*-${{ matrix.rid }}.${{ matrix.ext }}.sha256
          retention-days: 7

  publish-checksums:
    name: Aggregate checksums.txt
    needs: build-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download per-leg checksums
        uses: actions/download-artifact@v7
        with:
          pattern: checksum-*
          merge-multiple: true
          path: checksums-in

      - name: Aggregate
        shell: bash
        run: |
          set -euo pipefail

          # Normalize the aggregated file to text-mode format: strip any
          # leading '*' from the filename column. sha256sum on Git-Bash
          # (Windows runners) defaults to binary mode and emits
          # "<hash>  *<filename>", while Linux/macOS emit
          # "<hash>  <filename>". Normalizing here means checksums.txt is
          # uniform across platforms -- human operators reading the file
          # see one format, and installer parsers don't need per-line
          # tolerance for the '*' prefix.
          cat checksums-in/*.sha256 | sed 's/  \*/  /' > checksums.txt
          cat checksums.txt

      - name: Log existing checksums.txt (pre-upload)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          EXISTING=$(gh release view "${TAG}" --repo MrBildo/collabhost --json assets --jq \
            '.assets[] | select(.name == "checksums.txt") | .name' \
            || true)

          if [[ -n "${EXISTING}" ]]; then
            echo "WARNING: checksums.txt already exists on ${TAG} and will be replaced by --clobber."
            echo "If this is not a matrix re-run, consider re-cutting to the next patch version (spec §16.2)."
          else
            echo "No pre-existing checksums.txt on ${TAG}."
          fi

      - name: Upload aggregated checksums to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "${TAG}" checksums.txt --repo MrBildo/collabhost --clobber
